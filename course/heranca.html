<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>heranças</title>
    <style>
        section{
            color: aqua;
            background-color: blueviolet; /*posso colocar formatação especifica no descendente */
        }
        body{
            background-color: firebrick;
        }
        p{
            color: bisque;
        }
        p em{
            color: brown;
        }
        ul li{
            display: inline;
            margin-left: 30px;
            color: white;
            background-color: black;
        }
        ul + p{
            font-size: x-large;
        }
        h1 ~ h2{

            color: red;
        }
    </style>
</head>
<body>
    <section>
        <p>Exemplo de herança</p>
        <ul>
            <li>HTML</li>
            <li>CSS</li>
        </ul>
        <p>teste de paragrafo <em>inedito</em> para saber descendente</p>
    </section>
    
    <h1>herança em css</h1>
    <h2>linguagens</h2>
    <ul>
        <li>home</li>
        <li>portfolio</li>
    </ul>
    <p> teste de irmãos</p>

</body>
</html>
