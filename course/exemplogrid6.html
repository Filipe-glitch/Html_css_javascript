<!DOCTYPE html>
<html>
<head>
<style>
.container {
  display: grid;
  grid-template-columns: 2fr repeat(6, 1fr) 2fr;
  grid-template-rows: repeat(4, 80px);
  gap: 10px;
  height: 80vh;
}

.box {
  background: #3f21ad;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
}
</style>
</head>
<body>

<div class="container">
  <div class="box">1</div>
  <div class="box">2</div>
  <div class="box">3</div>
  <div class="box">4</div>
  <div class="box">5</div>
  <div class="box">6</div>
  <div class="box">7</div>
  <div class="box">8</div>
</div>

</body>
</html>
