<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Grid Conceitos Completos</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* CONTAINER GRID */
.container {
    display: grid;

    /* 4 colunas iguais usando fr */
    grid-template-columns: repeat(4, 1fr);

    /* 3 linhas */
    grid-template-rows: 80px 200px 100px;

    /* Espaçamento */
    gap: 10px;

    /* Alinhamento interno */
    justify-items: center;
    align-items: center;

    height: 100vh;
    padding: 10px;
}

/* Estilo base */
.box {
    background: #3f21ad;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
}

/* HEADER ocupa todas as colunas */
.header {
    grid-column: 1 / 5;
}

/* SIDEBAR ocupa duas linhas */
.sidebar {
    grid-row: 2 / 4;
}

/* CONTEÚDO principal ocupa 2 colunas */
.content {
    grid-column: 2 / 4;
}

/* FOOTER ocupa todas as colunas */
.footer {
    grid-column: 1 / 5;
}
</style>
</head>
<body>

<div class="container">
    <div class="box header">HEADER (grid-column 1 / 5)</div>
    <div class="box sidebar">SIDEBAR (grid-row 2 / 4)</div>
    <div class="box content">CONTENT (grid-column 2 / 4)</div>
    <div class="box">Extra 1</div>
    <div class="box footer">FOOTER (grid-column 1 / 5)</div>
</div>

</body>
</html>
