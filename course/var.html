<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>variavel var</title>
    <style>
:root {
    --cor: blue;
    }

.box1 {
    background: var(--cor);
    padding: 20px;
    color: white;
    }

.box2 {
    --cor: green;
    background: var(--cor);
    padding: 20px;
    color: white;
    }
    
    </style>
</head>
<body>
    <div class="box1">Usa azul (global)</div>
    <div class="box2">Usa verde (local)</div>
</body>
</html>
