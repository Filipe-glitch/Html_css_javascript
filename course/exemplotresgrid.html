<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exemplo grid trẽs</title>
    <style>
        .container {
           display: grid;
           grid-template-columns: 
           100px 50px 80px 200px;
           grid-template-rows: 80px 
           100px 100px;
           gap: 8px;
        }
        .box1 {
           grid-column-start: 1;
           grid-column-end: 5;
           grid-row-start: 3;
           grid-row-end: 4;
        }
        .box2 {
           grid-column-start: 3;
           grid-column-end: 5;
           grid-row-start: 1;
           grid-row-end: 3;
        }
    </style>
</head>
<body>
    <div class="container">
<div class="box1">1</div> 
<div class="box2">2</div> 
</div>
</body>
</html>
